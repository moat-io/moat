<div class="p-4 bg-white block sm:flex items-center justify-between border-b border-gray-200 lg:mt-1.5 dark:bg-gray-800 dark:border-gray-700">
    <div class="w-full mb-1">
        <div class="mb-4">
            {% include "partials/common/breadcrumbs.html" %}
            <h1 class="text-xl font-semibold text-gray-900 sm:text-2xl dark:text-white">Bundles</h1>
        </div>
        <div class="items-center justify-between block sm:flex md:divide-x md:divide-gray-100 dark:divide-gray-700">
            <div class="flex items-center mb-4 sm:mb-0">
                <form class="sm:pr-3">
                    <label for="bundles-search" class="sr-only">Search</label>
                    <div class="relative w-48 mt-1 sm:w-64 xl:w-96">
                        <input type="text" name="search_term"
                               id="bundles-search"
                               onkeydown="return event.key != 'Enter';"
                               hx-get="/bundles/table"
                               hx-trigger="load, keyup changed delay:0.2s, click from:#bundles-search-clear"
                               hx-target="#bundles-table"
                               hx-include="#app-state-sort-key, #app-state-scope"
                               class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
                               placeholder="Search by platform, hash, etag or filename">
                    </div>
                </form>
                <div class="flex items-center w-full sm:justify-end">
                    <div class="flex pl-2 space-x-1">
                        <a href="#"
                           id="bundles-search-clear"
                           onclick="document.getElementById('bundles-search').value = '';"
                           class="inline-flex justify-center p-1 text-gray-500 rounded cursor-pointer hover:text-gray-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"
                                 xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd"
                                      d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                                      clip-rule="evenodd"></path>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
            <div class="flex items-center">
                <label class="inline-flex items-center cursor-pointer">
                    <input type="checkbox"
                           name="bundle-scope"
                           value="platform"
                           hx-get="/bundles/table"
                           hx-target="#bundles-table"
                           hx-include="#app-state-search-term, #app-state-sort-key"
                           hx-vals='js:{"scope": event.target.checked ? "platform" : "all"}'
                           hx-trigger="change"
                           class="w-4 h-4 text-primary-600 bg-gray-100 border-gray-300 rounded focus:ring-primary-500 dark:focus:ring-primary-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                    <span class="ml-2 text-sm font-medium text-gray-900 dark:text-gray-300">Show latest by platform</span>
                </label>
            </div>
        </div>
    </div>
</div>
<div id="bundles-table">
    {% include 'partials/bundles/bundles-table.html' %}
</div>
